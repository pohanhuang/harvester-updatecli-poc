name: Bump k8s stack Go dependencies

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "updatecli/values/bump-go-k8s-stack.yaml"
  pull_request:
    branches: [main]
    paths:
      - "updatecli/values/bump-go-k8s-stack.yaml"
  schedule:
    # Run every Monday at 08:00 UTC (k8s stack bumps are less frequent)
    - cron: "0 8 * * 1"

jobs:
  updatecli:
    name: Bump k8s stack Go dependencies
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Updatecli
        uses: updatecli/updatecli-action@4b17f4ea784de29f71f85f9bc4955402ba1ae53c # v2.100.0

      - name: Diff (dry-run on PR)
        if: github.ref != 'refs/heads/main'
        env:
          GITHUB_TOKEN: ${{ secrets.HARVESTER_TOKEN }}
        run: |
          updatecli diff \
            --values updatecli/values/bump-go-k8s-stack.yaml \
            ghcr.io/updatecli/policies/golang/autodiscovery:0.12.0

      - name: Apply
        if: github.ref == 'refs/heads/main'
        env:
          GITHUB_TOKEN: ${{ secrets.HARVESTER_TOKEN }}
        run: |
          updatecli apply \
            --values updatecli/values/bump-go-k8s-stack.yaml \
            ghcr.io/updatecli/policies/golang/autodiscovery:0.12.0
