name: Bump Go dependencies (excluding k8s stack)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "updatecli/updatecli.d/bump-go-libs.yaml"
  pull_request:
    branches: [main]
    paths:
      - "updatecli/updatecli.d/bump-go-libs.yaml"
  schedule:
    - cron: "0 8 * * *"

jobs:
  updatecli:
    name: Bump third-party Go libraries
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Updatecli
        uses: updatecli/updatecli-action@4b17f4ea784de29f71f85f9bc4955402ba1ae53c # v2.100.0

      - name: Diff (dry-run on PR)
        if: github.ref != 'refs/heads/main'
        env:
          UPDATECLI_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          UPDATECLI_GITHUB_USERNAME: ${{ github.repository_owner }}
        run: updatecli diff --config updatecli/updatecli.d/bump-go-libs.yaml

      - name: Apply
        if: github.ref == 'refs/heads/main'
        env:
          UPDATECLI_GITHUB_APP_CLIENT_ID: ${{ secrets.APP_ID }}
          UPDATECLI_GITHUB_APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}
          UPDATECLI_GITHUB_APP_INSTALLATION_ID: ${{ secrets.APP_INSTALLATION_ID }}
        run: updatecli apply --clean --config updatecli/updatecli.d/bump-go-libs.yaml
