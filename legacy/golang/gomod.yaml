name: Update golang versions
pipelineid: "golang/versions"
sources: 
  golang:
    name: "golang versions in go.mod"
    kind: golang

targets:
  golang:
    kind: golang/gomod
    name: 'update go mod files to {{ source "golang" }}'
    scmid: github
    sourceid: golang
    spec:
      file: "go.mod"

conditions:
  golang:
    name: "check if go.mod exist"
    kind: file
    scmid: github
    disablesourceinput: true
    spec:
      file: "go.mod"

scms:
  github:
    kind: githubsearch
    spec:
      email: "{{ .github.email }}"
      user: "{{ .github.user }}" 
      limit: 0
      search: "{{ .scm.search}}"
      branch: "{{ .scm.branch }}"
      commitmessage:
        type: "{{ .scm.commitType }}"
        scope: "{{ .scm.commitScope }}"
        title: "update Golang version"
        footers: "{{ .github.footer }}"
        hidecredit: true   

actions:
  github:
    title: '{{ .actions.title }}'
    kind: github/pullrequest
    scmid: github
    spec:
      description: 'Update Golang version to {{ source "golang" }} in go.mod files'
      reviewers: {{ toYaml .actions.spec.reviewers | nindent 8 }}
      labels: {{ toYaml .actions.spec.labels | nindent 8 }}
