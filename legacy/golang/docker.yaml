name: Update golang versions
pipelineid: "golang/versions"
sources: 
  golang:
    kind: golang 
    name: golang versions

targets:
  dockerfile:
    name: 'update golang version in Dockerfile to {{ source "golang" }}'
    kind: dockerfile
    scmid: github
    sourceid: golang
    spec:
      file: "Dockerfile.dapper"
      instruction:
        keyword: "FROM"
        matcher: "golang"
    transformers:
      - addsuffix: "-bookworm"

conditions:
  docker:
    kind: dockerimage
    name: "check docker image tag"
    sourceid: golang
    spec:
      image: golang
    transformers:
      - addsuffix: "-bookworm"

scms:
  github:
    kind: githubsearch
    spec:
      email: "{{ .github.email }}"
      user: "{{ .github.user }}" 
      limit: 0
      search: "{{ .scm.search}}"
      branch: "{{ .scm.branch }}"
      commitmessage:
        type: "{{ .scm.commitType }}"
        scope: "{{ .scm.commitScope }}"
        title: "update Golang version"
        footers: "{{ .github.footer }}"
        hidecredit: true   

actions:
  github:
    title: '{{ .actions.title }}'
    kind: github/pullrequest
    scmid: github 
    spec:
      description: 'Update Golang version to {{ source "golang" }} in Dockerfile'
      reviewers: {{ toYaml .actions.spec.reviewers | nindent 8 }}
      labels: {{ toYaml .actions.spec.labels | nindent 8 }}
