targets:
  golang:
    kind: golang/gomod
    name: 'update go mod files to {{ source "golang" }}'
    scmid: github
    sourceid: golang
    spec:
      file: "go.mod"

conditions:
  golang:
    name: "check if go.mod exist"
    kind: file
    scmid: github
    disablesourceinput: true
    spec:
      file: "go.mod"
