targets:
  dockerfile:
    name: 'update golang version in Dockerfile to {{ source "golang" }}'
    kind: dockerfile
    scmid: github
    sourceid: golang
    spec:
      file: "Dockerfile.dapper"
      instruction:
        keyword: "FROM"
        matcher: "golang"
    transformers:
      - addsuffix: "-bookworm"

conditions:
  docker:
    kind: dockerimage
    name: "check docker image tag"
    sourceid: golang
    spec:
      image: golang
    transformers:
      - addsuffix: "-bookworm"
