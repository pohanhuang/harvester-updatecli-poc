name: Bump Go dependencies (excluding k8s stack)
pipelineid: golang/libs/autodiscovery
autodiscovery:
  groupby: individual
  scmid: default
  actionid: default
  crawlers:
    golang:
      ignore:
        - modules:
            "^k8s.io/": ""
        - modules:
            "^sigs.k8s.io/": ""

scms:
  default:
    kind: github
    spec:
      user: '{{ requiredEnv "GIT_AUTHOR_NAME" }}'
      email: '{{ requiredEnv "GIT_AUTHOR_EMAIL" }}'
      owner: pohanhuang
      repository: harvester
      branch: master
      username: '{{ requiredEnv "GITHUB_USERNAME" }}'
      token: '{{ requiredEnv "GITHUB_TOKEN" }}'

actions:
  default:
    kind: github/pullrequest
    scmid: default
    spec:
      labels:
        - dependencies
