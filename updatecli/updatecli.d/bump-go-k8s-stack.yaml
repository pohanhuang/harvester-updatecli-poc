name: Bump k8s stack Go dependencies
pipelineid: golang/k8s-stack/autodiscovery
autodiscovery:
  # groupby: all groups all k8s modules into a single PR to keep them in sync
  groupby: all
  scmid: default
  actionid: default
  crawlers:
    golang:
      only:
        - modules:
            "^k8s.io/": ""
        - modules:
            "^sigs.k8s.io/": ""

scms:
  default:
    kind: github
    spec:
      user: "{{ .github.author }}"
      email: "{{ .github.email }}"
      owner: pohanhuang
      repository: harvester
      branch: "{{ .github.branch }}"
     #  token: '{{ requiredEnv "GITHUB_TOKEN" }}'

actions:
  default:
    kind: github/pullrequest
    scmid: default
    spec:
      labels:
        - dependencies
        - k8s
