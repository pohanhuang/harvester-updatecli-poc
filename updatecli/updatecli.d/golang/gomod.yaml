name: Update golang versions
pipelineid: "golang/versions"
sources: 
  gomod:
    name: "golang versions in go.mod"
    kind: golang

targets:
  gomod:
    kind: golang/gomod
    name: 'update go mod files to {{ source "gomod" }}'
    scmid: github
    sourceid: gomod
    spec:
      file: "go.mod"

conditions:
  gomod:
    name: "check if go.mod exist"
    kind: file
    scmid: github
    disablesourceinput: true
    spec:
      file: "go.mod"

scms:
  github:
    kind: githubsearch
    spec:
      commitmessage:
        type: "chore"
        scope: "golang"
      limit: 0
      search: "repo:pohanhuang/harvester fork:true"
      # search: "repo:harvester/harvester"
      # search: "org:harvester is:public"
      branch: "^master$"
      # branch: '^master$|^v1\.8$|^v1\.7$'

actions:
  github:
    kind: github/pullrequest
    scmid: github 
    spec:
      reviewers:
        - harvester/dev
      labels:
        - dependencies

