name: Update golang versions
pipelineid: "golang/versions"
sources: 
  gha:
    name: golang versions in github action
    kind: golang

targets:
  github-action:
    name: 'deps(github-action): Bump Golang version to {{ source "gha" }}'
    kind: yaml
    spec:
        engine: yamlpath    
        files:
          - '.github/workflows/*'
        key: '$.jobs.build.steps[?(@.uses =~ /^actions\/setup-go/)].with.go-version'
        searchpattern: true
    scmid: github
    sourceid: gha

conditions:
  github-action:
    name: 'checking if file exist'
    kind: yaml
    spec:
        engine: yamlpath    
        files:
          - '.github/workflows/*'
        key: '$.jobs.build.steps[?(@.uses =~ /^actions\/setup-go/)].with.go-version'
        searchpattern: true
        keyonly: true
    scmid: github
    sourceid: gha

scms:
  github:
    kind: githubsearch
    spec:
      commitmessage:
        type: "chore"
        scope: "golang"
      limit: 0
      search: "repo:pohanhuang/harvester fork:true"
      # search: "repo:harvester/harvester"
      # search: "org:harvester is:public"
      branch: "^master$"
      # branch: '^master$|^v1\.8$|^v1\.7$'

actions:
  github:
    kind: github/pullrequest
    scmid: github 
    spec:
      reviewers:
        - harvester/dev
      labels:
        - dependencies

